# golangci-lint configuration
# https://golangci-lint.run/usage/configuration/

version: 1

linters:
  enable:
    - errcheck        # Check for ignored errors
    - gosimple       # Simplify code
    - govet          # Go vet analysis
    - ineffassign    # Detect ineffectual assignments
    - staticcheck    # Multi-language static analysis
    - typecheck      # Parse and type-check Go code
    - unused         # Check for unused constants, variables, functions and types
    - revive         # Drop-in replacement for golint
    - gosec          # Security problems
    - bodyclose      # Check http response body is closed
    - contextcheck   # Check for incorrect use of context
    - dogsled        # Check assignments with too many blank identifiers
    - dupl           # Code duplication detection
    - exportloopref  # Check for pointers to enclosing loop variables
    - prealloc       # Check for slice and map preallocation
    - whitespace     # Check for unnecessary whitespace

linters-settings:
  govet:
    check-shadowing: true
    enable:
      - fieldalignment
  staticcheck:
    go: "1.25"
  revive:
    rules:
      - name: exported
        disabled: false
      - name: indent-error-flow
        disabled: false
      - name: package-comments
        disabled: false
        arguments:
          - "snirect"
  gosec:
    excludes:
      - G104 # Ignore errors unchecked from HTTP Client Close (we handle conn lifecycle manually)
    config:
      G301: "0600" # Critical file permissions
      G302: "0600" # Critical file permissions
      G306: "0600" # Reliable permissions

issues:
  exclude-rules:
    - linters:
        - staticcheck
      text: "SA1019" # Ignore deprecated usage (e.g., context methods)
    - linters:
        - gosec
      text: "G402" # Ignore TLS MinVersion warnings (we control TLS config manually)
    - linters:
        - revive
      text: "package-comments" # Already have package comments

run:
  timeout: 5m
  go: "1.25"
